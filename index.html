<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chamber Files Portal - Verification</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; width: 100%; background-color: #1a1a1a; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* ১. ব্লিঙ্কিং লোগো এবং সার্কেল অ্যানিমেশন সেকশন */
        #loadingSection {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        
        .logo-wrapper {
            position: relative;
            width: 260px;
            height: 260px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-wrapper img {
            width: 150px;
            height: 150px;
            object-fit: contain;
            z-index: 5;
        }

        .circle-pulse {
            position: absolute;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,150,94,0.8) 0%, rgba(46,81,155,0.8) 100%);
            z-index: 1;
            animation: rippleBlink 2s infinite ease-in-out;
        }

        .circle-pulse-delayed {
            position: absolute;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,150,94,0.6) 0%, rgba(46,81,155,0.6) 100%);
            z-index: 1;
            animation: rippleBlink 2s infinite ease-in-out;
            animation-delay: 1s;
        }
        
        @keyframes rippleBlink {
            0% { transform: scale(0.9); opacity: 0.3; box-shadow: 0 0 0 0 rgba(0, 150, 94, 0.4), 0 0 0 0 rgba(46, 81, 155, 0.4); }
            50% { opacity: 0.9; box-shadow: 0 0 30px 15px rgba(0, 150, 94, 0.6), 0 0 30px 15px rgba(46, 81, 155, 0.6); }
            100% { transform: scale(1.6); opacity: 0; box-shadow: 0 0 50px 30px rgba(0, 150, 94, 0), 0 0 50px 30px rgba(46, 81, 155, 0); }
        }

        /* ২. ইন্টারস্টেশিয়াল পপ-আপ: Please wait Loading... */
        #interstitialPopup {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(26, 26, 26, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 99999;
        }

        .wait-box {
            background: #ffffff;
            padding: 35px 50px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: popIn 0.15s ease-out;
        }

        @keyframes popIn {
            0% { transform: scale(0.92); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .blue-spinner {
            width: 42px;
            height: 42px;
            border: 4.5px solid #e1f5fe;
            border-top: 4.5px solid #42a5f5;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .wait-text {
            color: #34495e;
            font-size: 21px;
            font-weight: 600;
        }

        /* ৩. মূল ওয়েবসাইট ইন্টারফেস (মোবাইল অপ্টিমাইজড) */
        #mainPortal {
            display: none;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            background: #f4f6f9;
        }

        .top-gradient-bar {
            background: linear-gradient(to right, #00965e 0%, #007c89 40%, #2e519b 75%, #3d5ba9 100%);
            height: 60px;
            width: 100%;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 0 20px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.25);
            flex-shrink: 0;
        }

        .top-gradient-bar .right-logo {
            height: 42px;
            width: auto;
            display: flex;
            align-items: center;
        }

        .top-gradient-bar .right-logo img {
            height: 100%;
            width: auto;
            object-fit: contain;
        }

        /* মোবাইল স্ক্রিনে পিডিএফ ফোর্স অটো-ভিউ কন্টেইনার */
        .pdf-viewer-container {
            flex: 1;
            width: 100%;
            height: calc(100vh - 60px);
            background: #525659;
            position: relative;
            overflow: hidden;
            -webkit-overflow-scrolling: touch;
        }

        iframe, object {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* ৪. এরর মেসেজ বক্স (আপনার স্ক্রিনশটের স্টাইল অনুযায়ী হুবহু ম্যাচ করা) */
        .error-box {
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-width: 400px;
            width: 85%;
            display: none;
            border-top: 6px solid #ef5350;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10000;
            animation: popIn 0.2s ease-out;
        }
        .error-icon {
            color: #ef5350;
            font-size: 45px;
            margin-bottom: 15px;
        }
        .error-title { color: #d32f2f; font-size: 22px; font-weight: bold; margin-bottom: 12px; }
        .error-desc { color: #666; font-size: 15px; line-height: 1.5; }
    </style>
</head>
<body>

    <div id="loadingSection">
        <div class="logo-wrapper">
            <div class="circle-pulse"></div>
            <div class="circle-pulse-delayed"></div>
            <img src="logo.png" alt="Chamber Logo">
        </div>
    </div>

    <div id="interstitialPopup">
        <div class="wait-box">
            <div class="blue-spinner"></div>
            <div class="wait-text">Please wait Loading...</div>
        </div>
    </div>

    <div id="mainPortal">
        <div class="top-gradient-bar">
            <div class="right-logo">
                <img src="header-logo.png" alt="Chamber Right Logo">
            </div>
        </div>
        <div class="pdf-viewer-container" id="pdfContainer">
            </div>
    </div>

    <div id="errorSection" class="error-box">
        <div class="error-icon">❌</div>
        <div id="errorTitle" class="error-title">Document Not Found</div>
        <div id="errorDesc" class="error-desc">The requested file does not exist in records.</div>
    </div>

<script>
    // গুরুত্বপূর্ণ: জেনারেটর এবং ইনডেক্স পেজের এই কি (Key) দুটি একদম সেম হতে হবে
    const SECRET_KEY = "ChamberOfficialSecretKey#2026";

    function getQueryParam(param) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(param);
    }

    function showError(title, desc) {
        document.getElementById('loadingSection').style.display = 'none';
        document.getElementById('interstitialPopup').style.display = 'none';
        document.getElementById('mainPortal').style.display = 'none';
        document.getElementById('errorSection').style.display = 'block';
        document.getElementById('errorTitle').innerText = title;
        document.getElementById('errorDesc').innerText = desc;
    }

    window.addEventListener('DOMContentLoaded', () => {
        const encryptedId = getQueryParam('id');

        if (!encryptedId) {
            showError("Document Not Found", "The requested file does not exist in records.");
            return;
        }

        try {
            // ইউআরএল স্পেস ফিক্স (+)
            const formattedToken = encryptedId.replace(/ /g, '+');
            const bytes = CryptoJS.AES.decrypt(formattedToken, SECRET_KEY);
            const decryptedData = bytes.toString(CryptoJS.enc.Utf8);

            if (!decryptedData) {
                showError("Verification Failed", "Tampered or Expired Token.");
                return;
            }

            // বড় জটিল সল্ট লিঙ্ক থেকে আসল ফাইল নেম আলাদা করার লজিক ফিক্স
            let decryptedRealId = "";
            if (decryptedData.includes('|')) {
                decryptedRealId = decryptedData.split('|')[1];
            } else {
                decryptedRealId = decryptedData; // ওল্ড ব্যাকআপ সাপোর্ট
            }

            const pdfUrl = `pdfs/${decryptedRealId}.pdf`;

            // ফাইলটি গিটহাবে আছে কিনা চেক করা হচ্ছে
            fetch(pdfUrl, { method: 'HEAD' })
                .then(response => {
                    if (response.ok) {
                        const container = document.getElementById('pdfContainer');
                        
                        // মোবাইল ব্রাউজারে বাটন ছাড়া অটো-ভিউ নিশ্চিত করতে অবজেক্ট ট্রিক প্লাগইন
                        container.innerHTML = `
                            <object data="${pdfUrl}" type="application/pdf">
                                <iframe src="https://docs.google.com/gview?url=${window.location.origin}/${window.location.pathname.split('/')[1]}/${pdfUrl}&embedded=true"></iframe>
                            </object>
                        `;

                        // অ্যানিমেশন ট্রানজিশন টাইমিং
                        setTimeout(() => {
                            document.getElementById('loadingSection').style.display = 'none';
                            document.getElementById('interstitialPopup').style.display = 'flex';

                            setTimeout(() => {
                                document.getElementById('interstitialPopup').style.display = 'none';
                                document.getElementById('mainPortal').style.display = 'flex';
                            }, 750); 

                        }, 1800);
                    } else {
                        showError("Document Not Found", "The requested file does not exist in records.");
                    }
                })
                .catch(error => {
                    showError("System Error", "Unable to complete verification portal request.");
                });

        } catch (e) {
            showError("Error", "Invalid Security Encryption Format.");
        }
    });
</script>

</body>
</html>
