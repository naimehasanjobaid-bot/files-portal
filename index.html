<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chamber Files Portal - Verification</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #1a1a1a; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            overflow: hidden;
        }
        
        /* ব্লিঙ্কিং লোগো কন্টেইনার */
        .loading-container { 
            text-align: center; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        @keyframes blink { 
            0% { opacity: 0.2; transform: scale(0.98); } 
            50% { opacity: 1; transform: scale(1); } 
            100% { opacity: 0.2; transform: scale(0.98); } 
        }
        
        .loading-container img { 
            width: 180px; 
            height: 180px;
            animation: blink 1.5s infinite ease-in-out; 
            margin-bottom: 20px;
        }

        .loading-text {
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            font-size: 16px;
            letter-spacing: 0.5px;
        }

        /* এরর মেসেজ দেখানোর স্টাইল */
        .error-box {
            background: #ffffff;
            padding: 30px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 4px 16px rgba(0,0,0,0.5);
            max-width: 450px;
            width: 100%;
            display: none;
            font-family: 'Segoe UI', sans-serif;
            border-top: 5px solid #c62828;
        }
        .error-title { color: #c62828; font-size: 18px; font-weight: bold; margin-bottom: 10px; }
        .error-desc { color: #555; font-size: 14px; }
    </style>
</head>
<body>

    <div id="loadingSection" class="loading-container">
        <img src="logo.png" alt="Chamber Logo">
        <div class="loading-text">جاري تحميل المستند الرسمي... (Official Document Loading...)</div>
    </div>

    <div id="errorSection" class="error-box">
        <div id="errorTitle" class="error-title"></div>
        <div id="errorDesc" class="error-desc"></div>
    </div>

<script>
    const SECRET_KEY = "ChamberOfficialSecretKey#2026";

    function getQueryParam(param) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(param);
    }

    function showError(title, desc) {
        document.getElementById('loadingSection').style.display = 'none';
        document.getElementById('errorSection').style.display = 'block';
        document.getElementById('errorTitle').innerText = title;
        document.getElementById('errorDesc').innerText = desc;
    }

    window.addEventListener('DOMContentLoaded', () => {
        const encryptedId = getQueryParam('id');

        if (!encryptedId) {
            showError("❌ Error 403", "Invalid Access Token or Bad Request.");
            return;
        }

        try {
            const formattedToken = encryptedId.replace(/ /g, '+');
            const bytes = CryptoJS.AES.decrypt(formattedToken, SECRET_KEY);
            const decryptedRealId = bytes.toString(CryptoJS.enc.Utf8);

            if (!decryptedRealId) {
                showError("❌ Verification Failed", "Tampered or Expired Token.");
                return;
            }

            // pdfs ফোল্ডারটি files-portal এর ভেতরেই আছে
            const pdfUrl = `pdfs/${decryptedRealId}.pdf`;

            // ফাইলটি সার্ভারে আছে কিনা চেক করা
            fetch(pdfUrl, { method: 'HEAD' })
                .then(response => {
                    if (response.ok) {
                        // ফাইল পাওয়া গেছে! এবার ব্লিঙ্কিং শেষ করে সরাসরি পিডিএফ ওপেন হবে
                        setTimeout(() => {
                            window.location.replace(pdfUrl);
                        }, 1500); // ১.৫ সেকেন্ড লোগো ব্লিঙ্ক করার পর অটোমেটিক রিডাইরেক্ট হবে
                    } else {
                        showError("❌ Document Not Found", "The requested file does not exist in records.");
                    }
                })
                .catch(error => {
                    showError("❌ System Error", "Unable to complete verification portal request.");
                });

        } catch (e) {
            showError("❌ Error", "Invalid Security Encryption Format.");
        }
    });
</script>

</body>
</html>
