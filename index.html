<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chamber Files Portal - Verification</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; width: 100%; background-color: #1a1a1a; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* ১. ব্লিঙ্কিং লোগো এবং সার্কেল অ্যানিমেশন সেকশন */
        #loadingSection {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        
        /* লোগো ও সার্কেলের মেইন কন্টেইনার */
        .logo-wrapper {
            position: relative;
            width: 260px;
            height: 260px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
        }

        /* লোগোর ছবি (এটি একদম ফিক্সড ও ক্লিয়ার থাকবে) */
        .logo-wrapper img {
            width: 150px;
            height: 150px;
            object-fit: contain;
            z-index: 5;
        }

        /* লোগোর ভেতর থেকে কালার সার্কেল ব্লিঙ্ক করার ম্যাজিক সিএসএস */
        .circle-pulse {
            position: absolute;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            /* আপনার ছবির হুবহু সবুজ ও নীল কম্বিনেশনের গ্রেডিয়েন্ট */
            background: radial-gradient(circle, rgba(0,150,94,0.8) 0%, rgba(46,81,155,0.8) 100%);
            z-index: 1;
            animation: rippleBlink 2s infinite ease-in-out;
        }

        /* দ্বিতীয় আরেকটি সার্কেল একটু দেরিতে ব্লিঙ্ক করার জন্য (স্মুথ ইফেক্ট) */
        .circle-pulse-delayed {
            position: absolute;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,150,94,0.6) 0%, rgba(46,81,155,0.6) 100%);
            z-index: 1;
            animation: rippleBlink 2s infinite ease-in-out;
            animation-delay: 1s;
        }
        
        /* সার্কেল ছড়িয়ে পড়ার অ্যানিমেশন কি-ফ্রেম */
        @keyframes rippleBlink {
            0% {
                transform: scale(0.9);
                opacity: 0.3;
                box-shadow: 0 0 0 0 rgba(0, 150, 94, 0.4), 0 0 0 0 rgba(46, 81, 155, 0.4);
            }
            50% {
                opacity: 0.9;
                box-shadow: 0 0 30px 15px rgba(0, 150, 94, 0.6), 0 0 30px 15px rgba(46, 81, 155, 0.6);
            }
            100% {
                transform: scale(1.6);
                opacity: 0;
                box-shadow: 0 0 50px 30px rgba(0, 150, 94, 0), 0 0 50px 30px rgba(46, 81, 155, 0);
            }
        }

        .loading-text { 
            color: #ffffff; 
            font-size: 16px; 
            text-align: center; 
            letter-spacing: 0.5px;
            font-weight: 500;
        }

        /* ২. মূল ওয়েবসাইট ইন্টারফেস (গ্রেডিয়েন্ট বার ও পিডিএফ) */
        #mainPortal {
            display: none;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            background: #f4f6f9;
        }

        /* পিওর সিএসএস গ্রেডিয়েন্ট টপ বার */
        .top-gradient-bar {
            background: linear-gradient(to right, #00965e 0%, #007c89 40%, #2e519b 75%, #3d5ba9 100%);
            height: 65px;
            width: 100%;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 0 25px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.25);
        }

        .top-gradient-bar .right-logo {
            height: 50px;
            width: auto;
            display: flex;
            align-items: center;
        }

        .top-gradient-bar .right-logo img {
            height: 100%;
            width: auto;
            object-fit: contain;
        }

        /* একই ট্যাবে ফুল স্ক্রিন পিডিএফ ভিউয়ার */
        .pdf-viewer-container {
            flex: 1;
            width: 100%;
            height: calc(100vh - 65px);
            background: #525659;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* ৩. এরর মেসেজ বক্স */
        .error-box {
            background: #ffffff;
            padding: 30px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 4px 16px rgba(0,0,0,0.5);
            max-width: 450px;
            width: 90%;
            display: none;
            border-top: 5px solid #c62828;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10000;
        }
        .error-title { color: #c62828; font-size: 18px; font-weight: bold; margin-bottom: 10px; }
        .error-desc { color: #555; font-size: 14px; }
    </style>
</head>
<body>

    <div id="loadingSection">
        <div class="logo-wrapper">
            <div class="circle-pulse"></div>
            <div class="circle-pulse-delayed"></div>
            <img src="logo.png" alt="Chamber Logo">
        </div>
        <div class="loading-text">جاري تحميل المستند الرسمي... <br>(Official Document Loading...)</div>
    </div>

    <div id="mainPortal">
        <div class="top-gradient-bar">
            <div class="right-logo">
                <img src="header-logo.png" alt="Chamber Right Logo">
            </div>
        </div>
        <div class="pdf-viewer-container">
            <iframe id="pdfFrame" src=""></iframe>
        </div>
    </div>

    <div id="errorSection" class="error-box">
        <div id="errorTitle" class="error-title"></div>
        <div id="errorDesc" class="error-desc"></div>
    </div>

<script>
    const SECRET_KEY = "ChamberOfficialSecretKey#2026";

    function getQueryParam(param) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(param);
    }

    function showError(title, desc) {
        document.getElementById('loadingSection').style.display = 'none';
        document.getElementById('mainPortal').style.display = 'none';
        document.getElementById('errorSection').style.display = 'block';
        document.getElementById('errorTitle').innerText = title;
        document.getElementById('errorDesc').innerText = desc;
    }

    window.addEventListener('DOMContentLoaded', () => {
        const encryptedId = getQueryParam('id');

        if (!encryptedId) {
            showError("❌ Error 403", "Invalid Access Token or Bad Request.");
            return;
        }

        try {
            const formattedToken = encryptedId.replace(/ /g, '+');
            const bytes = CryptoJS.AES.decrypt(formattedToken, SECRET_KEY);
            const decryptedRealId = bytes.toString(CryptoJS.enc.Utf8);

            if (!decryptedRealId) {
                showError("❌ Verification Failed", "Tampered or Expired Token.");
                return;
            }

            const pdfUrl = `pdfs/${decryptedRealId}.pdf`;

            fetch(pdfUrl, { method: 'HEAD' })
                .then(response => {
                    if (response.ok) {
                        const pdfFrame = document.getElementById('pdfFrame');
                        pdfFrame.src = pdfUrl;

                        // ২ সেকেন্ড চমৎকার পালস অ্যানিমেশন দেখানোর পর মূল পিডিএফ পেজ ওপেন হবে
                        setTimeout(() => {
                            document.getElementById('loadingSection').style.display = 'none';
                            document.getElementById('mainPortal').style.display = 'flex';
                        }, 2000);
                    } else {
                        showError("❌ Document Not Found", "The requested file does not exist in records.");
                    }
                })
                .catch(error => {
                    showError("❌ System Error", "Unable to complete verification portal request.");
                });

        } catch (e) {
            showError("❌ Error", "Invalid Security Encryption Format.");
        }
    });
</script>

</body>
</html>
